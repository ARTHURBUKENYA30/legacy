<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Shoots Legacy Sports Squash Academy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a2d04b0df3.js" crossorigin="anonymous"></script>

<style>
:root{
--navy:#0B1E3F;
--gold:#FFB400;
--orange:#FF6B00;
}

body{
font-family:'Poppins',sans-serif;
background:#081730;
color:white;
}

/* NAVBAR */
.navbar{background:rgba(11,30,63,0.95);backdrop-filter:blur(10px);} 
.navbar-brand img{height:50px;}
.nav-link{color:white!important;font-weight:600;}
.nav-link:hover{color:var(--gold)!important;}

/* HERO */
.hero{
margin-top:70px;
min-height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:url('img/1.jpg') center/cover no-repeat;
position:relative;
}
.hero::after{content:"";position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.6);} 
.hero-content{position:relative;z-index:2;}
.hero h1{font-size:clamp(1.8rem,5vw,3rem);} 

.youtube-btn{background:red;padding:12px 30px;border-radius:30px;color:white;font-weight:bold;text-decoration:none;}
.youtube-btn:hover{background:#cc0000;}

section{padding:70px 5%;text-align:center;}
section h2{color:var(--gold);margin-bottom:20px;}

.highlight{background:rgba(255,255,255,0.1);padding:20px;border-radius:10px;text-align:left;}

/* FOUNDERS */
.founders{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.founder{background:rgba(255,255,255,0.05);padding:20px;border-radius:10px;width:260px;}

/* GALLERY */
.gallery-container{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.gallery-container img{width:100%;height:180px;object-fit:cover;border-radius:10px;}

@media(max-width:992px){.gallery-container{grid-template-columns:repeat(3,1fr);}}
@media(max-width:768px){.gallery-container{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.gallery-container{grid-template-columns:1fr;}}

/* SPONSORS */
.sponsor-levels{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;}
.sponsor-card{background:rgba(255,255,255,0.05);padding:20px;border-radius:10px;}

/* STATS */
.stats{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.stat h3{color:var(--gold);font-size:2rem;}

footer{background:#000;padding:30px;text-align:center;}

.whatsapp-float{position:fixed;bottom:20px;right:20px;background:#25D366;padding:15px;border-radius:50%;color:white;font-size:22px;}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand
